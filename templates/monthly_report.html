{% extends 'base.html' %}

{% block content %}

<!-- Font -->

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #f4f7fb;
    --card: #ffffff;
    --dark-bg: #0f172a;
    --dark-card: #1e293b;
}

/* Global */
body {
    background-color:lightblue;
    font-family: 'Poppins', sans-serif;
}
/* Container */
.toppart {
    margin-top: 50px;
}

/* Filter Card */
.form-inline {
    background: var(--card);
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
}

/* Select & Labels */
label {
    font-weight: 500;
    margin-right: 5px;
}

select {
    border-radius: 10px !important;
    padding: 5px 10px;
    border: 1px solid #ddd;
}

/* Button */
.btn-primary {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border: none;
    border-radius: 20px;
    padding: 6px 18px;
    transition: 0.3s;
}

.btn-primary:hover {
    transform: scale(1.05);
}

/* Table Card */
.bottomtab {
    margin-top: 30px;
    background: var(--card);
    padding: 20px;
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* Table */
.table {
    border-collapse: separate;
    border-spacing: 0 10px;
}

.table thead th {
    border: none;
    color: black;
    font-weight: 500;
}

/* Rows */
.table tbody tr {
    background: #f9fafb;
    transition: 0.3s;
    border-radius: 10px;
}

.table tbody tr:hover {
    transform: translateY(-3px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* Cells */
.table td {
    border: none;
    padding: 12px;
}

/* Empty Text */
h4 {
    text-align: center;
    margin-top: 20px;
    color: #ef4444;
}

/* Dark Mode */
body.dark-mode {
    background: var(--dark-bg);
    color: #e2e8f0;
}

body.dark-mode .form-inline,
body.dark-mode .bottomtab {
    background: var(--dark-card);
}

body.dark-mode .table tbody tr {
    background: #334155;
}
</style>

<div class="container toppart">

```
<!-- Filter Section -->
<form class="form-inline" action="{% url 'monthlyreport' %}" method="post">
    {% csrf_token %}

    <label>Year</label>
    <select name="year">
        {% for year in years %}
        <option value="{{ year }}" {% if year == start_year %}selected{% endif %}>
            {{ year }}
        </option>
        {% endfor %}
    </select>

    <label>Month</label>
    <select name="month">
        {% for month in months %}
        <option value="{{ forloop.counter }}" {% if forloop.counter == start_month %}selected{% endif %}>
            {{ month }}
        </option>
        {% endfor %}
    </select>

    <input type="submit" class="btn btn-primary" value="Filter">
</form>

<!-- Table Section -->
<div class="bottomtab">
    <table class="table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Purpose</th>
                <th>Amount</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody>
            {% for i in records %}
            <tr>
                <td>{{ i.name.firstname }}</td>
                <td>{{ i.purpose }}</td>
                <td>₹{{ i.expense }}</td>
                <td>{{ i.date|date:"d-M-Y" }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <h4>{{ norecords }}</h4>
</div>
```

</div>

{% endblock %}
